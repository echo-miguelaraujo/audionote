<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravador Minimalista com IA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="top-glow"></div>
        
        <div class="content-area" id="contentArea">
            <p class="placeholder-text" id="statusText">Toque no botão abaixo para gravar.</p>
        </div>

        <div class="bottom-controls">
            <div class="tab-toggle">
                <span id="tabOriginal" class="active">Original</span>
                <span class="separator">|</span>
                <span id="tabResumo">Resumo</span>
            </div>
        </div>
    </div>
    
    <div class="record-button-container">
        <button id="recordBtn" class="record-btn"></button>
    </div>

    <script src="script.js"></script>
</body>
</html>
